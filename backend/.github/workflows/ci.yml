name: CI

# Runs on every push and PR to main, plus feature branches opening a PR.
# This exists specifically to catch things like a wrong dependency version in
# package.json before they get merged — the kind of bug that otherwise only
# surfaces when someone happens to run npm install locally.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck, build, secrets scan)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Scan for obvious hardcoded secrets
        run: npm run secrets:scan

  frontend:
    name: Frontend (typecheck, lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        # Dummy Firebase values so the build doesn't fail on missing env —
        # this only verifies the app compiles, it doesn't run against real Firebase.
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:0:web:0
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build